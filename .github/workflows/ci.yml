name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node 24
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run ToolPin config doctor
        run: npm run self:doctor

      - name: Run ToolPin self-check
        run: npm run self:ci

      - name: Check docs consistency
        run: npm run docs:check

      - name: Check curated registry
        run: npm run registry:check

      - name: Build docs
        run: npm run docs:build
