name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node 22
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run ToolPin config doctor
        run: npm run self:doctor

      - name: Run ToolPin self-check
        run: npm run self:ci

      - name: Check docs consistency
        run: npm run docs:check

      - name: Check curated registry
        run: npm run registry:check

      - name: Build docs
        run: npm run docs:build
