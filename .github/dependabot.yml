version: 2
updates:
  # Keep runtime/dev npm dependencies patched.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # Adopted runtime lane: ToolPin itself targets Node 24 LTS, undici 7,
      # @types/node 24, and TypeScript 6. Keep minor/patch updates flowing on
      # those lanes, but defer future incompatible majors to an explicit
      # runtime-upgrade issue instead of weekly automation.
      - dependency-name: "undici"
        versions: [">=8"]
      - dependency-name: "@types/node"
        versions: [">=25"]
      - dependency-name: "typescript"
        versions: [">=7"]

  # Keep pinned GitHub Actions SHAs current (Dependabot updates the pin + comment).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
