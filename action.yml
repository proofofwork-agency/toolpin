name: ToolPin CI
description: Verify an MCP lockfile with toolpin ci.

inputs:
  working-directory:
    description: Directory that contains mcp-lock.json.
    required: false
    default: .
  file:
    description: Lockfile path, relative to working-directory.
    required: false
    default: mcp-lock.json
  source:
    description: Optional registry source passed to --source. Leave empty to use each lockfile entry's recorded source, falling back to all for older locks.
    required: false
    default: ""
  live:
    description: Fetch live registry data instead of relying on local cache.
    required: false
    default: "true"
  verify:
    description: Run verification before comparing locked plans.
    required: false
    default: ""
  require-verified:
    description: Require fresh ToolPin-verified artifact evidence when verification runs.
    required: false
    default: ""
  strict:
    description: Preset for verify + require-verified. Explicit conflicting inputs fail closed.
    required: false
    default: "false"
  doctor:
    description: Run toolpin doctor before ci. auto runs when known project MCP client config files exist.
    required: false
    default: auto
  sarif:
    description: Write toolpin ci SARIF output to toolpin-ci.sarif and expose sarif-path.
    required: false
    default: "false"
  expect-digest:
    description: Expected whole-lock digest from a trusted out-of-band source.
    required: false
    default: ""
  signature:
    description: Detached signature path.
    required: false
    default: ""
  public-key:
    description: Public key path used with signature.
    required: false
    default: ""
  toolpin-version:
    description: Optional npm version specifier for the published @proofofwork-agency/toolpin npm package. Leave empty to install from this action source.
    required: false
    default: ""
  policy:
    description: Policy file path.
    required: false
    default: .toolpin/policy.json
  no-policy:
    description: Pass --no-policy and skip policy enforcement.
    required: false
    default: "false"
  timeout:
    description: Live verification timeout in milliseconds.
    required: false
    default: "15000"
  skip-live-verification:
    description: Pass --skip-live-verification when verify is enabled.
    required: false
    default: "false"
  allow-execute:
    description: Pass --allow-execute so live verification may execute package targets (required to re-verify live capability pins on package entries).
    required: false
    default: "false"

outputs:
  sarif-path:
    description: Path to SARIF output when sarif is true.
    value: ${{ steps.toolpin-ci.outputs.sarif-path }}

branding:
  icon: lock
  color: blue

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22

    - name: Install ToolPin
      shell: bash
      run: |
        set -euo pipefail

        if [[ -n "${TOOLPIN_VERSION}" ]]; then
          npm install -g "@proofofwork-agency/toolpin@${TOOLPIN_VERSION}"
        else
          npm ci --prefix "$GITHUB_ACTION_PATH"
          npm run --prefix "$GITHUB_ACTION_PATH" build
          npm install -g "$GITHUB_ACTION_PATH"
        fi
      env:
        TOOLPIN_VERSION: ${{ inputs.toolpin-version }}

    - name: Run toolpin ci
      id: toolpin-ci
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        bool_input() {
          local name="$1"
          local value="$2"
          if [[ -n "$value" && "$value" != "true" && "$value" != "false" ]]; then
            echo "ToolPin CI input '$name' must be true or false." >&2
            exit 2
          fi
        }

        bool_required_input() {
          local name="$1"
          local value="$2"
          if [[ "$value" != "true" && "$value" != "false" ]]; then
            echo "ToolPin CI input '$name' must be true or false." >&2
            exit 2
          fi
        }

        bool_input verify "$TOOLPIN_VERIFY"
        bool_input require-verified "$TOOLPIN_REQUIRE_VERIFIED"
        bool_required_input strict "$TOOLPIN_STRICT"
        bool_required_input live "$TOOLPIN_LIVE"
        bool_required_input no-policy "$TOOLPIN_NO_POLICY"
        bool_required_input skip-live-verification "$TOOLPIN_SKIP_LIVE_VERIFICATION"
        bool_required_input allow-execute "$TOOLPIN_ALLOW_EXECUTE"
        bool_required_input sarif "$TOOLPIN_SARIF"

        if [[ "$TOOLPIN_DOCTOR" != "auto" && "$TOOLPIN_DOCTOR" != "true" && "$TOOLPIN_DOCTOR" != "false" ]]; then
          echo "ToolPin CI input 'doctor' must be auto, true, or false." >&2
          exit 2
        fi

        effective_verify="${TOOLPIN_VERIFY:-false}"
        effective_require_verified="${TOOLPIN_REQUIRE_VERIFIED:-false}"
        if [[ "$TOOLPIN_STRICT" == "true" ]]; then
          if [[ "$TOOLPIN_VERIFY" == "false" ]]; then
            echo "ToolPin CI input conflict: strict:true requires verify:true; remove verify:false or disable strict." >&2
            exit 2
          fi
          if [[ "$TOOLPIN_REQUIRE_VERIFIED" == "false" ]]; then
            echo "ToolPin CI input conflict: strict:true requires require-verified:true; remove require-verified:false or disable strict." >&2
            exit 2
          fi
          effective_verify="true"
          effective_require_verified="true"
        fi

        if [[ "$effective_require_verified" == "true" && "$effective_verify" != "true" ]]; then
          echo "ToolPin CI input conflict: require-verified:true requires verify:true." >&2
          exit 2
        fi

        should_doctor="false"
        if [[ "$TOOLPIN_DOCTOR" == "true" ]]; then
          should_doctor="true"
        elif [[ "$TOOLPIN_DOCTOR" == "auto" ]]; then
          for project_config in .mcp.json .cursor/mcp.json .vscode/mcp.json .codex/config.toml opencode.json .gemini/settings.json .roo/mcp.json; do
            if [[ -e "$project_config" ]]; then
              should_doctor="true"
              break
            fi
          done
        fi

        if [[ "$should_doctor" == "true" ]]; then
          doctor_cmd=(toolpin doctor --file "$TOOLPIN_FILE" --scope project)
          printf 'Running:'
          printf ' %q' "${doctor_cmd[@]}"
          printf '\n'
          "${doctor_cmd[@]}"
        else
          echo "ToolPin doctor: SKIPPED"
        fi

        cmd=(toolpin ci --file "$TOOLPIN_FILE")

        if [[ -n "$TOOLPIN_SOURCE" ]]; then
          cmd+=(--source "$TOOLPIN_SOURCE")
        fi

        if [[ "$TOOLPIN_LIVE" == "true" ]]; then
          cmd+=(--live)
        fi

        if [[ "$effective_verify" == "true" ]]; then
          cmd+=(--verify --timeout "$TOOLPIN_TIMEOUT")
        fi

        if [[ "$effective_require_verified" == "true" ]]; then
          cmd+=(--require-verified)
        fi

        if [[ "$TOOLPIN_SKIP_LIVE_VERIFICATION" == "true" ]]; then
          cmd+=(--skip-live-verification)
        fi

        if [[ "$TOOLPIN_ALLOW_EXECUTE" == "true" ]]; then
          cmd+=(--allow-execute)
        fi

        if [[ -n "$TOOLPIN_EXPECT_DIGEST" ]]; then
          cmd+=(--expect-digest "$TOOLPIN_EXPECT_DIGEST")
        fi

        if [[ -n "$TOOLPIN_SIGNATURE" || -n "$TOOLPIN_PUBLIC_KEY" ]]; then
          if [[ -z "$TOOLPIN_SIGNATURE" || -z "$TOOLPIN_PUBLIC_KEY" ]]; then
            echo "ToolPin CI requires both signature and public-key when either is set." >&2
            exit 2
          fi
          cmd+=(--signature "$TOOLPIN_SIGNATURE" --public-key "$TOOLPIN_PUBLIC_KEY")
        fi

        if [[ "$TOOLPIN_NO_POLICY" == "true" ]]; then
          cmd+=(--no-policy)
        elif [[ -n "$TOOLPIN_POLICY" ]]; then
          cmd+=(--policy "$TOOLPIN_POLICY")
        fi

        if [[ "$TOOLPIN_SARIF" == "true" ]]; then
          cmd+=(--sarif)
        fi

        printf 'Running:'
        printf ' %q' "${cmd[@]}"
        printf '\n'

        if [[ "$TOOLPIN_SARIF" == "true" ]]; then
          sarif_path="toolpin-ci.sarif"
          set +e
          "${cmd[@]}" > "$sarif_path"
          status=$?
          set -e
          echo "sarif-path=$sarif_path" >> "$GITHUB_OUTPUT"
          exit "$status"
        fi

        "${cmd[@]}"
      env:
        TOOLPIN_FILE: ${{ inputs.file }}
        TOOLPIN_SOURCE: ${{ inputs.source }}
        TOOLPIN_LIVE: ${{ inputs.live }}
        TOOLPIN_VERIFY: ${{ inputs.verify }}
        TOOLPIN_REQUIRE_VERIFIED: ${{ inputs.require-verified }}
        TOOLPIN_STRICT: ${{ inputs.strict }}
        TOOLPIN_DOCTOR: ${{ inputs.doctor }}
        TOOLPIN_SARIF: ${{ inputs.sarif }}
        TOOLPIN_EXPECT_DIGEST: ${{ inputs.expect-digest }}
        TOOLPIN_SIGNATURE: ${{ inputs.signature }}
        TOOLPIN_PUBLIC_KEY: ${{ inputs.public-key }}
        TOOLPIN_POLICY: ${{ inputs.policy }}
        TOOLPIN_NO_POLICY: ${{ inputs.no-policy }}
        TOOLPIN_TIMEOUT: ${{ inputs.timeout }}
        TOOLPIN_SKIP_LIVE_VERIFICATION: ${{ inputs.skip-live-verification }}
        TOOLPIN_ALLOW_EXECUTE: ${{ inputs.allow-execute }}
